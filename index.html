<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Stock Manager & Event Control Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="module" src="app.js"></script>
    <!-- Order matters if app.js relies on firebase-config.js -->
<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased" x-data="stockApp" x-init="init()">

    <div x-show="!isAuthenticated && !authChecking" class="fixed inset-0 bg-slate-900 flex flex-col justify-center items-center z-50 p-4" x-cloak>
        <div class="bg-white p-8 rounded-xl max-w-sm w-full shadow-2xl border border-slate-200 text-center">
            <div class="w-16 h-16 bg-amber-50 text-amber-600 rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4 border border-amber-200">💎</div>
            <h3 class="text-xl font-extrabold tracking-tight text-slate-800 uppercase mb-1">Jewel'D Suite</h3>
            <p class="text-xs text-slate-500 mb-6">Inventory Ledger Authentication</p>
            <form @submit.prevent="verifyLogin()" class="space-y-4 text-left text-xs">
                <div>
                    <label class="block font-bold mb-1 text-slate-700 tracking-wide uppercase text-[10px]">Operator Username</label>
                    <input type="text" x-model="loginForm.username" placeholder="e.g. admin" class="border border-slate-300 p-2.5 w-full rounded-lg bg-slate-50 focus:ring-2 focus:ring-slate-500">
                </div>
                <div>
                    <label class="block font-bold mb-1 text-slate-700 tracking-wide uppercase text-[10px]">Passphrase Code</label>
                    <input type="password" x-model="loginForm.password" placeholder="••••••••" class="border border-slate-300 p-2.5 w-full rounded-lg text-center tracking-widest font-mono bg-slate-50 text-base focus:ring-2 focus:ring-slate-500">
                </div>
                <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white w-full py-3 rounded-lg font-bold text-xs mt-4 uppercase tracking-wider shadow-md transition">Unlock Corporate Dashboard</button>
            </form>
            <p x-show="loginError" x-text="loginError" class="text-rose-600 text-xs font-bold text-center mt-3" x-cloak></p>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 space-y-6" x-show="isAuthenticated" x-cloak>
        <template x-if="ready">
            <div class="space-y-6">
                
                <header class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center gap-4 flex-wrap">
                    <div class="space-y-1">
                        <h1 class="text-2xl font-black tracking-tight text-slate-800 flex items-center gap-2">📊 Restaurant Inventory Operations</h1>
                        <p class="text-xs text-slate-500">Logged in as <span class="font-bold text-slate-800" x-text="currentUsername"></span> <span class="mx-2 text-slate-300">|</span> Security Scope: <span class="bg-slate-100 text-slate-800 font-bold px-2 py-0.5 rounded text-[10px] uppercase border border-slate-200" x-text="currentRole"></span></p>
                    </div>
                    <div class="flex gap-2 items-center flex-wrap">
                        <button @click="showAccountModal = true" class="text-xs bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-3 py-2 rounded-lg font-bold tracking-wide transition shadow-sm">👤 Security Settings</button>
                        <button x-show="currentRole === 'admin'" @click="showUserAdminModal = true" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg font-bold tracking-wide border border-indigo-200 transition shadow-sm">🧑‍💼 Operator & Category Management Suite</button>
                        <button x-show="currentRole !== 'readonly'" @click="downloadInwardSupplierReport()" class="text-xs bg-amber-600 hover:bg-amber-700 text-white px-3 py-2 rounded-lg font-bold tracking-wide flex items-center gap-1.5 transition shadow-md">🧾 Supplier Inward Report (.xlsx)</button>
                        <button @click="downloadExcelReport()" class="text-xs bg-emerald-700 hover:bg-emerald-800 text-white px-3 py-2 rounded-lg font-bold tracking-wide flex items-center gap-1.5 transition shadow-md">📊 Export 30-Day Excel (.xlsx)</button>
                        <button @click="logout()" class="text-xs bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-700 font-bold px-3 py-2 rounded-lg transition">🔒 Close Session</button>
                    </div>
                </header>

                <section class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4" 
                         x-show="currentRole === 'admin' || currentRole === 'inward' || currentRole === 'order'" 
                         x-cloak>
                    
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                        <div class="text-xs font-black uppercase tracking-wider text-indigo-950 flex items-center gap-1.5">
                            📦 Incoming Procurement Reconciliation Desk
                        </div>
                        <div class="flex bg-slate-100 p-0.5 rounded-lg border text-[11px] font-bold">
                            <button type="button" @click="orderViewTab = 'pending'" :class="orderViewTab === 'pending' ? 'bg-white shadow-xs text-slate-900' : 'text-slate-500'" class="px-3 py-1 rounded-md transition">Pending Deliveries</button>
                            <button type="button" @click="orderViewTab = 'historical'" :class="orderViewTab === 'historical' ? 'bg-white shadow-xs text-slate-900' : 'text-slate-500'" class="px-3 py-1 rounded-md transition">Archived / Resolved</button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <template x-for="order in processedPurchaseOrders" :key="order.id">
                            <div class="border rounded-xl p-4 bg-slate-50/50 flex flex-col justify-between space-y-3">
                                <div class="space-y-1">
                                    <div class="flex justify-between items-start">
                                        <span class="font-extrabold text-sm text-slate-800" x-text="order.supplier_name"></span>
                                        <span :class="{
                                            'bg-amber-100 text-amber-800 border-amber-200': order.status === 'PENDING',
                                            'bg-emerald-100 text-emerald-800 border-emerald-200': order.status === 'RECEIVED',
                                            'bg-sky-100 text-sky-800 border-sky-200': order.status === 'PARTIAL',
                                            'bg-rose-100 text-rose-800 border-rose-200': order.status === 'DECLINED'
                                        }" class="text-[9px] uppercase font-black px-2 py-0.5 rounded border tracking-wider" x-text="order.status"></span>
                                    </div>
                                    <p class="text-[10px] text-slate-400 font-mono">
                                        Issued: <span x-text="new Date(order.created_at).toLocaleString('en-GB')"></span> by <span class="text-slate-700 font-bold" x-text="order.created_by"></span>
                                    </p>
                                </div>

                                <div class="bg-white border rounded-lg p-2 divide-y divide-slate-100 text-xs font-mono">
                                    <template x-for="it in order.items" :key="it.id">
                                        <div class="py-1.5 flex justify-between items-center gap-2">
                                            <span class="font-sans text-slate-700" x-text="it.name"></span>
                                            <div class="flex items-center gap-1.5">
                                                <span class="text-slate-400 text-[10px]" x-text="order.status === 'PENDING' ? 'Recv Qty:' : 'Ingested:'"></span>
                                                <input type="number" 
                                                       min="0" 
                                                       x-model.number="it.qty" 
                                                       :disabled="order.status !== 'PENDING'" 
                                                       class="w-14 border text-center rounded p-0.5 bg-slate-50 font-bold text-slate-900 focus:ring-1 focus:ring-emerald-500 disabled:opacity-75">
                                            </div>
                                        </div>
                                    </template>
                                </div>

                                <div class="flex gap-2 pt-1" x-show="order.status === 'PENDING' && (currentRole === 'admin' || currentRole === 'inward')">
                                    <button type="button" @click="declineIncomingOrder(order)" class="flex-1 bg-white hover:bg-rose-50 border border-slate-200 text-rose-600 font-bold py-1.5 rounded-lg text-xs transition uppercase tracking-wide">Decline</button>
                                    <button type="button" @click="approveIncomingOrder(order)" class="flex-1 bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-1.5 rounded-lg text-xs shadow-sm transition uppercase tracking-wide">Approve Inward</button>
                                </div>
                            </div>
                        </template>
                        
                        <template x-if="processedPurchaseOrders.length === 0">
                            <div class="text-xs text-slate-400 italic py-4 text-center md:col-span-2 bg-slate-50 border border-dashed rounded-xl">
                                No active order manifests recorded under this tracking view.
                            </div>
                        </template>
                    </div>
                </section>

                <!-- NEW COMPREHENSIVE HIGH-PAX CATERING ENGINE (SLIDING WINDOW MATRIX & 10 INPUT FORM) -->
                <section class="bg-slate-50 border border-slate-200 p-5 rounded-xl text-xs space-y-4 shadow-xs">
                    <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                        <span class="font-black uppercase tracking-wider text-slate-800 text-xs flex items-center gap-1.5">
                            📢 Scheduled High-Pax Catering Event Matrix (Next 7 Days)
                        </span>
                    </div>

                    <!-- 7-Day Live Matrix Layout Grid -->
                    <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-3">
                        <template x-for="day in cateringWeek" :key="day.dbKey">
                            <div @click="openCateringModal(day)"
                                 :class="hasCateringEvent(day.dbKey) ? 'bg-rose-100 border-rose-400 text-rose-900 font-bold' : 'bg-white border-slate-200 text-slate-700'"
                                 class="border rounded-xl p-3 text-center cursor-pointer transition transform hover:-translate-y-0.5 hover:shadow-sm">
                                <div class="text-[10px] opacity-70 uppercase tracking-wider" x-text="day.label"></div>
                                <div class="mt-2 text-xs flex items-center justify-center gap-1">
                                    <span x-text="hasCateringEvent(day.dbKey) ? '🚨 Scheduled' : 'Clear'"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Input Entry Dashboard Area -->
                    <div x-show="currentRole === 'admin' || currentRole === 'order'" class="bg-white border border-slate-200 p-4 rounded-xl space-y-4 shadow-2xs">
                        <div class="font-bold text-slate-800 text-[11px] uppercase tracking-wider flex items-center gap-1">
                            ➕ Stage New High-Pax Event Portfolio
                        </div>
                        <form @submit.prevent="submitCateringForm()" class="space-y-3">
                            <div>
                                <label class="block font-bold text-slate-600 mb-1">Select Targets Target Date:</label>
                                <input type="date" x-model="cateringForm.date" required class="border border-slate-300 p-2 rounded-md bg-slate-50 text-xs w-full sm:w-auto">
                            </div>
                            
                            <div>
                                <label class="block font-bold text-slate-600 mb-1.5">Menu Items Input Ledger (Up to 10 Rows):</label>
                                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-2">
                                    <template x-for="(val, idx) in cateringForm.items" :key="idx">
                                        <input type="text" :placeholder="'Menu Item ' + (idx + 1)" x-model="cateringForm.items[idx]" class="border border-slate-300 p-2 rounded-md bg-slate-50 text-xs w-full">
                                    </template>
                                </div>
                            </div>
                            
                            <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white font-bold text-[11px] px-4 py-2 rounded-lg shadow-sm uppercase transition tracking-wider">
                                Push Scheduled Matrix to Cloud
                            </button>
                        </form>
                    </div>
                </section>

                <section class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4" x-show="currentRole === 'admin' || currentRole === 'order'">
                    <div class="text-xs font-black uppercase tracking-wider text-indigo-800 border-b border-slate-100 pb-2">📝 Automated Supplier Purchase Order Desk</div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                        <div class="bg-slate-50 p-3 rounded-lg border">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Target Supplier</label>
                            <select x-model="orderDesk.supplierId" @change="orderDesk.selectedItemId = ''" class="border p-2.5 rounded-md w-full bg-white font-bold text-slate-700">
                                <option value="">-- Choose Vendor --</option>
                                <template x-for="sup in suppliers" :key="sup.id">
                                    <option :value="sup.id" x-text="sup.name"></option>
                                </template>
                            </select>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border md:col-span-2 space-y-3">
                            <div class="flex gap-2 items-end">
                                <div class="flex-1">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Select Product Item (Cascading Supplier Filter)</label>
                                    <select x-model="orderDesk.selectedItemId" :disabled="!orderDesk.supplierId" class="border p-2 rounded-md w-full bg-white font-medium text-slate-700 disabled:opacity-50">
                                        <option value="">-- Choose Product --</option>
                                        <template x-for="item in filteredOrderDeskItems" :key="item.id">
                                            <option :value="item.id" x-text="item.name"></option>
                                        </template>
                                    </select>
                                </div>
                                <div class="w-24">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Qty</label>
                                    <input type="number" x-model.number="orderDesk.selectedQty" placeholder="10" class="border p-2 rounded-md w-full text-center bg-white font-mono font-bold">
                                </div>
                                <button @click="addItemToOrder()" class="bg-indigo-700 text-white font-bold px-4 py-2 rounded-md transition uppercase text-[11px]">Add Item</button>
                            </div>
                            <div class="border rounded-md bg-white p-2.5 space-y-1.5" x-show="orderDesk.basket.length > 0">
                                <template x-for="(b, idx) in orderDesk.basket" :key="idx">
                                    <div class="flex justify-between items-center text-xs bg-slate-50 border p-1 rounded font-mono">
                                        <span>📌 <span class="font-sans" x-text="b.name"></span> — Qty: <span class="font-bold text-indigo-600" x-text="b.qty"></span></span>
                                        <button @click="removeOrderBasketItem(idx)" class="text-rose-600 font-bold px-1 text-[11px]">Remove</button>
                                    </div>
                                </template>
                            </div>
                            <button @click="sendWhatsAppOrder()" x-show="orderDesk.basket.length > 0 && orderDesk.supplierId" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-center uppercase tracking-wider transition shadow-sm">
                                📱 Send Thread to Supplier WhatsApp
                            </button>
                        </div>
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" x-show="currentRole !== 'readonly' && currentRole !== 'order'">
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4" x-show="currentRole === 'admin' || currentRole === 'inward'">
                        <div class="text-xs font-bold uppercase tracking-wider text-emerald-800 border-b border-slate-100 pb-2">📥 Log New Inward Manual Consignment</div>
                        <div class="grid grid-cols-4 gap-3 text-xs">
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">First Select Registered Supplier</label>
                                <select x-model="formInward.supplierName" @change="formInward.itemId = ''" class="border border-slate-300 p-2.5 rounded-lg bg-slate-50 w-full font-bold text-slate-700">
                                    <option value="">-- Choose Supplier --</option>
                                    <template x-for="sup in suppliers" :key="sup.id">
                                        <option :value="sup.name" x-text="sup.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Select Product (Filtered Axis)</label>
                                <select x-model="formInward.itemId" :disabled="!formInward.supplierName" class="border border-slate-300 p-2.5 rounded-lg bg-slate-50 w-full font-medium text-slate-700 disabled:opacity-50">
                                    <option value="">-- Select Product --</option>
                                    <template x-for="item in filteredInwardItems" :key="item.id">
                                        <option :value="item.id" x-text="item.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="col-span-4">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Units</label>
                                <input type="number" x-model.number="formInward.qty" placeholder="Units" class="border border-slate-300 p-2.5 rounded-lg text-center font-mono bg-slate-50 w-full font-bold">
                            </div>
                        </div>
                        <button @click="addInward()" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-bold py-2.5 rounded-lg shadow-sm transition uppercase tracking-wider mt-2">Commit Inward Entry to Cloud</button>
                        
                        <div class="mt-2" x-show="lastLogId && lastLogType === 'INWARD'" x-transition x-cloak>
                            <button @click="undoLastTransaction()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-black text-xs py-2 rounded-lg transition uppercase tracking-wider shadow-xs flex items-center justify-center gap-1.5">
                                ↩️ Undo / Redo Last Inward Entry
                            </button>
                        </div>

                        <div class="pt-3 border-t border-dashed border-slate-200 flex flex-col gap-3" x-show="currentRole === 'admin'">
                            <button @click="showNewItemModal = true" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold px-3 py-1.5 rounded-md transition shadow-xs text-xs">➕ Add New Item Portfolio Axis</button>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-4" x-show="currentRole === 'admin' || currentRole === 'outward'">
                        <div class="text-xs font-bold uppercase tracking-wider text-rose-800 border-b border-slate-100 pb-2">📤 Issue Line Outward Allocation</div>
                        <div class="grid grid-cols-3 gap-3 text-xs">
                            <select x-model="formOutward.itemId" class="border border-slate-300 p-2.5 rounded-lg bg-slate-50 w-full font-medium text-slate-700">
                                <option value="">-- Item --</option>
                                <template x-for="item in items" :key="item.id">
                                    <option :value="item.id" x-text="item.name"></option>
                                </template>
                            </select>
                            <select x-model="formOutward.department" class="border border-slate-300 p-2.5 rounded-lg bg-slate-50 w-full font-bold text-slate-700">
                                <template x-for="dept in departments" :key="dept">
                                    <option :value="dept" x-text="dept"></option>
                                </template>
                            </select>
                            <input type="number" x-model.number="formOutward.qty" placeholder="Units" class="border border-slate-300 p-2.5 rounded-lg text-center font-mono bg-slate-50 w-full font-bold">
                        </div>
                        <button @click="deductOutward()" class="w-full bg-rose-700 hover:bg-rose-800 text-white text-xs font-bold py-2.5 rounded-lg shadow-sm transition uppercase tracking-wider">Execute Deduction & Issue Stock</button>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-2.5" x-show="logs.length > 0 && currentRole !== 'readonly' && currentRole !== 'order'">
                    <div class="text-[11px] font-bold uppercase text-slate-500 tracking-wider">⏱️ Real-time Transaction Ledger Streams (LIFO Buffer Timeline):</div>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="log in logs" :key="log.id">
                            <div class="bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg text-xs flex items-center gap-2.5 font-mono shadow-2xs">
                                <span :class="log.type === 'INWARD' ? 'text-emerald-700 bg-emerald-50 border border-emerald-200' : 'text-rose-700 bg-rose-50 border border-rose-200'" class="font-bold px-1.5 py-0.5 rounded text-[10px]">
                                    <span x-text="log.type === 'INWARD' ? '📥 IN +' : '📤 OUT -'"></span><span x-text="log.qty"></span>
                                </span>
                                <span class="font-bold font-sans text-slate-800" x-text="log.item_name"></span>
                                <span class="text-[10px] bg-emerald-50 border border-emerald-200 text-emerald-800 px-1.5 py-0.5 rounded font-bold" x-show="log.supplier_name" x-text="'Vendor: ' + log.supplier_name"></span>
                                <span class="text-[10px] bg-slate-200 text-slate-700 border border-slate-300 px-1.5 py-0.5 rounded font-bold" x-show="log.department" x-text="log.department"></span>
                                <button @click="triggerUndo(log)" class="text-[10px] bg-amber-50 hover:bg-amber-100 border border-amber-200 text-amber-900 px-2 py-0.5 rounded-md font-extrabold font-sans transition" x-show="isWithin30Minutes(log.created_at)">↩ Revert</button>
                            </div>
                        </template>
                    </div>
                </div>

                <section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b border-slate-200 flex flex-wrap justify-between items-center gap-3">
                        <div class="space-y-0.5">
                            <div class="text-sm font-extrabold text-slate-800 uppercase tracking-wide">Live Infrastructure Ledger Engine</div>
                            <p class="text-[11px] text-slate-500">Real-time balances matching safety parameters</p>
                        </div>
                        <div class="flex flex-wrap gap-1.5 text-xs font-bold">
                            <button @click="filterCat = 'all'" :class="filterCat === 'all' ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'" class="px-3 py-1.5 rounded-lg border shadow-2xs transition">📁 All Categories</button>
                            <template x-for="cat in categories" :key="cat.id">
                                <button @click="filterCat = cat.name" :style="'background-color: ' + (filterCat === cat.name ? cat.border_color : cat.bg_color) + '; color: ' + (filterCat === cat.name ? '#fff' : cat.text_color) + '; border-color: ' + cat.border_color" class="px-2.5 py-1 rounded border transition" x-text="cat.emoji + ' ' + cat.name"></button>
                            </template>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs border-collapse">
                            <thead>
                                <tr class="bg-slate-100 border-b border-slate-200 text-slate-600 uppercase tracking-wider text-[10px] font-black">
                                    <th class="py-4 px-4 w-16 text-center" x-show="currentRole === 'admin'">Move</th>
                                    <th class="py-4 px-4 min-w-[180px]">Item Name</th>                       
                                    <th class="py-4 px-4 text-center w-28">Live Stock Balance</th>  
                                    <th class="py-4 px-4 w-32">Status Vector</th>         
                                    <th class="py-4 px-4 min-w-[150px]">Assigned Supplier</th>        
                                    <th class="py-4 px-4 text-center w-28" x-show="currentRole !== 'readonly'">Unit Price (MRP)</th> 
                                    <th class="py-4 px-4 w-36">Category Tag</th>
                                    <th class="py-4 px-4 text-center w-24">Safety Limit</th>
                                    <th class="py-4 px-4 text-right min-w-[160px]" x-show="currentRole === 'admin' || currentRole === 'inward'">Management Axis</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                <template x-for="item in processedItems" :key="item.id">
                                    <tr :class="item.stock <= item.threshold ? 'bg-rose-50/60 font-medium' : 'hover:bg-slate-50/70'" class="transition">
                                        <td class="py-5 px-4 text-center space-x-1 whitespace-nowrap" x-show="currentRole === 'admin'">
                                            <button @click="shiftOrder(item.id, 'up')" class="text-slate-400 hover:text-slate-800 font-bold px-0.5">▲</button>
                                            <button @click="shiftOrder(item.id, 'down')" class="text-slate-400 hover:text-slate-800 font-bold px-0.5">▼</button>
                                        </td>
                                        <td class="py-5 px-4 font-extrabold text-slate-900 text-sm tracking-tight whitespace-nowrap" x-text="item.name"></td>
                                        <td class="py-5 px-4 text-center font-mono text-sm font-black tracking-wide whitespace-nowrap" :class="item.stock <= item.threshold ? 'text-rose-600' : 'text-slate-800'" x-text="item.stock"></td>
                                        <td class="py-5 px-4 whitespace-nowrap">
                                            <template x-if="item.stock === 0"><span class="bg-rose-100 text-rose-800 border border-rose-200 text-[10px] px-2.5 py-1 rounded-md font-bold uppercase tracking-wider">Out of stock</span></template>
                                            <template x-if="item.stock > 0 && item.stock <= item.threshold"><span class="bg-amber-100 text-amber-800 border border-amber-200 text-[10px] px-2.5 py-1 rounded-md font-bold uppercase tracking-wider">Low stock</span></template>
                                            <template x-if="item.stock > item.threshold"><span class="bg-emerald-100 text-emerald-800 border border-emerald-200 text-[10px] px-2.5 py-1 rounded-md font-bold uppercase tracking-wider">Healthy</span></template>
                                        </td>
                                        <td class="py-5 px-4 font-bold text-slate-600 text-xs whitespace-nowrap">
                                            <span class="bg-slate-50 px-2.5 py-1 rounded border border-slate-200" x-text="item.supplier_name || 'General Vendor'"></span>
                                        </td>
                                        <td class="py-5 px-4 text-center font-mono font-bold text-slate-700 text-sm whitespace-nowrap" x-show="currentRole !== 'readonly'" x-text="'₹' + (item.mrp || 0)"></td>
                                        <td class="py-5 px-4 whitespace-nowrap">
                                            <span :style="'background-color: ' + item.bg + '; color: ' + item.text_color + '; border-color: ' + item.border" class="px-3 py-1 rounded-md text-[10px] uppercase font-black border tracking-wide shadow-3xs" x-text="item.emoji + ' ' + item.category_name"></span>
                                        </td>
                                        <td class="py-5 px-4 text-center font-mono text-slate-400 font-bold text-xs whitespace-nowrap" x-text="item.threshold"></td>
                                        <td class="p-4 text-right space-x-2.5 whitespace-nowrap" x-show="currentRole === 'admin' || currentRole === 'inward'">
                                            <button @click="changeItemName(item)" class="text-slate-600 font-bold text-[11px]">✏️ Edit Details</button>
                                            <span class="text-slate-200">|</span>
                                            <button @click="modifyThreshold(item)" class="text-slate-600 font-bold text-[11px]">Limit</button>
                                            <span class="text-slate-200" x-show="currentRole === 'admin'">|</span>
                                            <button @click="purgeItem(item.id)" class="text-rose-600 font-bold text-[11px]" x-show="currentRole === 'admin'">Purge</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </section>
                
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" x-show="showUserAdminModal" x-cloak>
                    <div class="bg-white p-6 rounded-xl max-w-lg w-full shadow-2xl space-y-5 border border-slate-200 max-h-[90vh] overflow-y-auto">
                        <div>
                            <h3 class="text-sm font-bold uppercase text-slate-800 border-b pb-1 mb-2">🧑‍💼 Authorized System Operators Directory</h3>
                            <div class="border rounded-lg bg-slate-50 overflow-hidden divide-y max-h-36 overflow-y-auto">
                                <template x-for="u in users" :key="u.id">
                                    <div class="p-2.5 flex items-center justify-between gap-3 bg-white text-xs">
                                        <div>
                                            <div class="font-extrabold text-slate-800 text-sm" x-text="u.username"></div>
                                            <div class="text-[10px] font-mono text-slate-400 uppercase" x-text="'Scope: ' + u.role"></div>
                                        </div>
                                        <div class="flex items-center gap-1.5">
                                            <select @change="changeUserRole(u.id, $event.target.value)" class="border rounded p-1 bg-slate-50 text-[11px] font-bold">
                                                <option value="admin" :selected="u.role === 'admin'">admin</option>
                                                <option value="inward" :selected="u.role === 'inward'">inward</option>
                                                <option value="outward" :selected="u.role === 'outward'">outward</option>
                                                <option value="order" :selected="u.role === 'order'">order</option>
                                                <option value="readonly" :selected="u.role === 'readonly'">readonly</option>
                                            </select>
                                            <button @click="promptResetPassword(u)" class="text-[10px] bg-slate-50 hover:bg-slate-100 border px-2 py-1 rounded font-medium">Reset Key</button>
                                            <button @click="deleteUser(u.id)" class="text-[10px] bg-rose-50 border border-rose-100 text-rose-700 font-bold px-2 py-1 rounded">Delete</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <div class="mt-3 grid grid-cols-2 gap-2 text-xs bg-slate-50 p-2 rounded-lg border">
                                <input type="text" x-model="newUserForm.username" placeholder="New Operator Username" class="border p-2 rounded bg-white">
                                <input type="password" x-model="newUserForm.password" placeholder="Passphrase (6+ chars)" class="border p-2 rounded bg-white">
                                <select x-model="newUserForm.role" class="border p-2 rounded bg-white font-bold col-span-2">
                                    <option value="inward">inward</option>
                                    <option value="outward">outward</option>
                                    <option value="order">order</option>
                                    <option value="readonly">readonly</option>
                                </select>
                                <button @click="createUser()" class="w-full bg-slate-800 text-white font-bold py-2 rounded text-xs uppercase tracking-wide col-span-2">Save Operator to Cloud</button>
                            </div>
                        </div>

                        <div class="border-t pt-3">
                            <h3 class="text-sm font-bold uppercase text-slate-800 border-b pb-1 mb-2">📁 Provision Custom Inventory Category Axis</h3>
                            <div class="grid grid-cols-3 gap-2 text-xs bg-slate-50 p-3 rounded-lg border space-y-1">
                                <div class="col-span-2">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-0.5">Category Name</label>
                                    <input type="text" x-model="newCategoryForm.name" placeholder="e.g. Sauces or Spices" class="border p-2 rounded bg-white w-full">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-0.5">Visual Emoji</label>
                                    <input type="text" x-model="newCategoryForm.emoji" placeholder="🥫" class="border p-2 rounded bg-white w-full text-center text-sm">
                                </div>
                                <div class="col-span-3">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Select Palette Theme Accent</label>
                                    <div class="grid grid-cols-3 gap-2">
                                        <template x-for="(p, idx) in paletteOptions" :key="idx">
                                            <button @click="newCategoryForm.paletteIndex = idx" 
                                                    :style="'background-color: ' + p.bg + '; color: ' + p.text + '; border-color: ' + p.border"
                                                    :class="newCategoryForm.paletteIndex === idx ? 'ring-2 ring-slate-900 border-2 scale-95' : 'opacity-80'"
                                                    class="p-2 rounded border text-[10px] uppercase font-black transition tracking-wider text-center"
                                                    type="button"
                                                    x-text="idx === 0 ? 'Blue' : idx === 1 ? 'Amber' : idx === 2 ? 'Green' : idx === 3 ? 'Purple' : idx === 4 ? 'Pink' : 'Slate'">
                                            </button>
                                        </template>
                                    </div>
                                </div>
                                <button @click="submitNewCategory()" type="button" class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-black py-2.5 rounded text-xs uppercase tracking-wide col-span-3 shadow-xs">
                                    Deploy Fresh Category Segment Live
                                </button>
                            </div>
                        </div>

                        <button @click="showUserAdminModal = false" class="w-full bg-slate-100 text-xs font-bold py-2.5 rounded-lg border mt-2">Dismiss Administration Suite</button>
                    </div>
                </div>

                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" x-show="showNewItemModal" x-cloak>
                    <div class="bg-white p-6 rounded-xl max-w-sm w-full shadow-2xl space-y-4 border border-slate-200">
                        <h3 class="text-sm font-black uppercase text-slate-800 tracking-wide border-b pb-1">➕ Append Portfolio Tracking row</h3>
                        <div class="space-y-3 text-xs">
                            <div>
                                <label class="block font-bold text-slate-600 mb-1">Product Description Label</label>
                                <input type="text" x-model="newItemForm.name" class="border border-slate-300 p-2 w-full rounded-md" placeholder="e.g. Cardamom Powder">
                            </div>
                            <div>
                                <label class="block font-bold text-slate-600 mb-1">Select Base Segment ID</label>
                                <select x-model="newItemForm.categoryId" class="border border-slate-300 p-2 w-full rounded-md bg-white text-slate-700">
                                    <option value="">-- Assign Portfolio Group --</option>
                                    <template x-for="cat in categories" :key="cat.id">
                                        <option :value="cat.id" x-text="cat.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block font-bold text-slate-600 mb-1">Link Default Supplier/Vendor</label>
                                <select x-model="newItemForm.supplierName" class="border border-slate-300 p-2 w-full rounded-md bg-white text-slate-700">
                                    <option value="">-- Choose Supplier --</option>
                                    <template x-for="sup in suppliers" :key="sup.id">
                                        <option :value="sup.name" x-text="sup.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="block font-bold text-slate-600 mb-1">Safety Limit</label><input type="number" x-model.number="newItemForm.threshold" class="border border-slate-300 p-2 w-full rounded-md text-center" placeholder="10"></div>
                                <div x-show="currentRole !== 'readonly'"><label class="block font-bold text-slate-600 mb-1">Unit Price (MRP)</label><input type="number" x-model.number="newItemForm.mrp" class="border border-slate-300 p-2 w-full rounded-md text-center" placeholder="0"></div>
                            </div>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button @click="showNewItemModal = false" class="flex-1 bg-slate-100 border text-xs font-bold py-2 rounded-lg">Dismiss</button>
                            <button @click="submitNewItem()" class="flex-1 bg-slate-800 text-white text-xs font-bold py-2 rounded-lg">Commit Axis</button>
                        </div>
                    </div>
                </div>

                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" x-show="showAccountModal" x-cloak>
                    <form @submit.prevent="changeMyPassword()" class="bg-white p-6 rounded-xl max-w-sm w-full shadow-2xl space-y-4 border border-slate-200">
                        <h3 class="text-sm font-bold uppercase text-slate-800 border-b pb-1">👤 Security Key Settings</h3>
                        <div class="space-y-3 text-xs">
                            <input type="password" placeholder="Current Passphrase" autocomplete="current-password" x-model="accountForm.currentPassword" class="border p-2 w-full rounded-md bg-slate-50">
                            <input type="password" placeholder="New Secret Security Key" autocomplete="new-password" x-model="accountForm.newPassword" class="border p-2 w-full rounded-md bg-slate-50">
                        </div>
                        <p class="text-rose-600 text-[11px] font-bold" x-show="accountError" x-text="accountError" class="text-rose-600 text-[11px] font-bold" x-cloak></p>
                        <p class="text-emerald-600 text-[11px] font-bold" x-show="accountSuccess" x-text="accountSuccess" class="text-emerald-600 text-[11px] font-bold" x-cloak></p>
                        <div class="flex gap-2 pt-2">
                            <button type="button" @click="showAccountModal = false" class="flex-1 bg-slate-100 border text-xs font-bold py-2 rounded-lg">Dismiss</button>
                            <button type="submit" class="flex-1 bg-slate-800 text-white text-xs font-bold py-2 rounded-lg">Apply Passphrase Update</button>
                        </div>
                    </form>
                </div>

                <!-- DYNAMIC ALPINE POPUP MODAL FOR VIEWING TEXT MENUS -->
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" x-show="cateringModal.show" x-cloak>
                    <div class="bg-white p-6 rounded-xl max-w-sm w-full shadow-2xl space-y-4 border border-slate-200">
                        <h3 class="text-sm font-black uppercase text-slate-800 tracking-wide border-b pb-1" x-text="'Menu Details for ' + cateringModal.label"></h3>
                        <div class="bg-slate-50 border p-3 rounded-lg max-h-[250px] overflow-y-auto">
                            <pre class="whitespace-pre-wrap font-sans text-xs text-slate-800 leading-relaxed" x-text="cateringModal.text"></pre>
                        </div>
                        <div class="flex gap-2 pt-1">
                            <button @click="cateringModal.show = false" class="w-full bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold py-2 rounded-lg transition">Close</button>
                        </div>
                    </div>
                </div>

            </div>
        </template>
    </main>
</body>
</html>
